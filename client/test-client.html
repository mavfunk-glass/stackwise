<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StackWise API Test Client</title>
    <style>
      :root {
        --navy: #0f1f3d;
        --lime: #a8e63d;
        --light: #f5f7fa;
      }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial,
          'Noto Sans', 'Liberation Sans', sans-serif;
        background: var(--light);
        color: #111827;
        margin: 0;
        padding: 24px;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 8px;
        color: var(--navy);
        font-size: 22px;
      }
      .sub {
        margin-bottom: 18px;
        color: #374151;
      }
      textarea {
        width: 100%;
        min-height: 220px;
        resize: vertical;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono',
          'Courier New', monospace;
        font-size: 12.5px;
        line-height: 1.45;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin: 12px 0;
      }
      button {
        border: none;
        border-radius: 14px;
        padding: 12px 16px;
        background: var(--navy);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .pill {
        background: rgba(168, 230, 61, 0.18);
        border: 1px solid rgba(168, 230, 61, 0.35);
        color: #365314;
        padding: 8px 10px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 12px;
      }
      pre {
        margin: 14px 0 0;
        background: #0b1220;
        color: #e5e7eb;
        padding: 14px;
        border-radius: 14px;
        overflow: auto;
        max-height: 520px;
      }
      .hint {
        font-size: 12.5px;
        color: #4b5563;
        line-height: 1.4;
      }
      .err {
        color: #b91c1c;
        font-weight: 800;
      }
      .ok {
        color: var(--lime);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>StackWise API Test Client</h1>
      <div class="sub">Posts your intake JSON to <code>/api/analyze</code> and prints the response.</div>

      <div class="pill">No mock data is generated. Paste real JSON.</div>

      <div style="height: 14px;"></div>

      <div class="hint">
        Expected JSON shape:
        <div style="margin-top: 6px; font-weight: 700;">ageRange, biologicalSex, primaryGoal, currentFeelings[], healthBackground[], dietaryPreferences[], monthlyBudget</div>
      </div>

      <div style="height: 12px;"></div>

      <textarea id="payload" placeholder="Paste intake JSON here (no sample data)."></textarea>

      <div class="row">
        <button id="sendBtn" type="button">POST /api/analyze</button>
        <div id="status" class="hint"></div>
      </div>

      <pre id="output">{}</pre>
    </div>

    <script>
      const sendBtn = document.getElementById('sendBtn');
      const payloadEl = document.getElementById('payload');
      const outputEl = document.getElementById('output');
      const statusEl = document.getElementById('status');

      function pretty(x) {
        try {
          return JSON.stringify(x, null, 2);
        } catch {
          return String(x);
        }
      }

      sendBtn.addEventListener('click', async () => {
        statusEl.textContent = '';
        sendBtn.disabled = true;
        outputEl.textContent = '{}';

        const raw = payloadEl.value.trim();
        if (!raw) {
          statusEl.innerHTML = '<span class="err">Please paste a JSON payload first.</span>';
          sendBtn.disabled = false;
          return;
        }

        let body;
        try {
          body = JSON.parse(raw);
        } catch (e) {
          statusEl.innerHTML = '<span class="err">Invalid JSON: ' + String(e && e.message ? e.message : e) + '</span>';
          sendBtn.disabled = false;
          return;
        }

        try {
          const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            statusEl.innerHTML = '<span class="err">Request failed: HTTP ' + res.status + '</span>';
          } else {
            statusEl.innerHTML = '<span class="ok">Request succeeded</span>';
          }

          outputEl.textContent = pretty(data);
        } catch (err) {
          statusEl.innerHTML = '<span class="err">Network/Fetch error: ' + String(err) + '</span>';
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
