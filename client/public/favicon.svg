  <path d="M28 48 Q22 32 20 26 Q24 22 32 28 Q38 36 42 42Z" fill="#FFB09A" opacity="0.95"/>
  <!-- right ear -->
  <path d="M100 52 Q112 34 114 24 Q110 14 98 22 Q86 30 78 42 Q84 52 94 52 Q98 54 100 52Z"
