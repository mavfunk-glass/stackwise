<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 5 116 96" fill="none">
  <!-- left ear -->
  <path d="M26 52 Q14 34 12 24 Q16 14 28 22 Q40 30 48 42 Q42 52 32 52 Q28 54 26 52Z"
