  <!-- head -->
  <ellipse cx="63" cy="50" rx="44" ry="42" fill="#1E1E1E" stroke="#0D0D0D" stroke-width="5"/>
  <!-- muzzle -->
  <path d="M48 60 Q63 56 78 60 Q84 63 82 68 Q80 73 63 75 Q46 73 44 68 Q42 63 48 60Z" fill="#EEF0EE"/>
