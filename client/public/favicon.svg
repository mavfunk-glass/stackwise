  <ellipse cx="22" cy="62" rx="18" ry="13" fill="rgba(220,70,40,0.22)"/>
  <ellipse cx="104" cy="62" rx="18" ry="13" fill="rgba(220,70,40,0.22)"/>
  <!-- eyes (happy closed crescents) -->
  <path d="M36 54 Q46 40 56 54" stroke="#1A0A00" stroke-width="3.8" stroke-linecap="round" fill="none"/>
  <path d="M71 54 Q80 40 89 54" stroke="#1A0A00" stroke-width="3.8" stroke-linecap="round" fill="none"/>
  <!-- nose -->
  <path d="M59 66 L63 62 L67 66 Q63 71 59 66Z" fill="#C87060"/>
  <!-- mouth -->
  <path d="M55 72 Q63 83 71 72" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- whiskers -->
  <line x1="6" y1="63" x2="42" y2="65" stroke="#D0C0A8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="70" x2="42" y2="70" stroke="#D0C0A8" stroke-width="1" stroke-linecap="round"/>
  <line x1="84" y1="65" x2="120" y2="63" stroke="#D0C0A8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="84" y1="70" x2="120" y2="70" stroke="#D0C0A8" stroke-width="1" stroke-linecap="round"/>
</svg>
